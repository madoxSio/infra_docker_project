services:
  auth-db:
    image: mongo:latest
    container_name: auth-db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - auth_data:/data/db
    networks:
      - ecom-network

  product-db:
    image: mongo:latest
    container_name: product-db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - product_data:/data/db
    networks:
      - ecom-network

  order-db:
    image: mongo:latest
    container_name: order-db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - order_data:/data/db
    networks:
      - ecom-network

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@auth-db:27017/auth_db?authSource=admin
    depends_on:
      - auth-db
    networks:
      - ecom-network
    deploy:
      resources:
        limits:
          memory: 120M  

  product-service:
    build: ./services/product-service
    container_name: product-service
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@product-db:27017/products_db?authSource=admin
    depends_on:
      - product-db
    ports:
      - "3000:3000"    
    networks:
      - ecom-network
    deploy:
      resources:
        limits:
          memory: 120M  

  order-service:
    build: ./services/order-service
    container_name: order-service
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@order-db:27017/order_db?authSource=admin
      - AUTH_SERVICE_URL=http://auth-service:3000
      - PRODUCT_SERVICE_URL=http://product-service:3000
    depends_on:
      - order-db
      - auth-service
      - product-service
    networks:
      - ecom-network
    deploy:
      resources:
        limits:
          memory: 120M  

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - product-service
      - order-service  
    networks:
      - ecom-network

volumes:
  auth_data:
  product_data:
  order_data:

networks:
  ecom-network:
    name: ecom-network
    driver: bridge